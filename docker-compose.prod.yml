# =============================================================================
# GoGoFresh Attendance — Production Docker Compose Template
# =============================================================================
# This template runs the FULL stack in containers, including PostgreSQL
# (the `db` service below). This is the production default: it works on any
# host with Docker, even old OS releases (e.g. Ubuntu 18.04) whose apt repos
# only carry PostgreSQL 10 — far below the required 14+.
#
# If you instead want to reuse an EXISTING PostgreSQL 14+ running on the
# Docker host (shared with other apps on the same VM), see the
# "host Postgres alternative" comment block at the bottom of this file and
# the notes in docs/PRODUCTION_DEPLOYMENT_GUIDE.md.
#
# Differences from docker-compose.yml (dev):
#   - No bind mounts (images are self-contained, immutable)
#   - No --reload on uvicorn; use --workers for concurrency
#   - No hardcoded secrets; all env values pulled from .env files
#   - Backend/frontend behind a reverse proxy (nginx/Caddy) for TLS termination
#     — TLS is NOT handled in this file; put Caddy/nginx in front.
# =============================================================================
# Usage:
#   cp backend/.env.production.example backend/.env
#   cp frontend/.env.production.example frontend/.env.production
#   # fill in real values in both .env files AND the root .env
#   # (POSTGRES_PASSWORD here must match the password inside DATABASE_URL)
#   docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-attendance_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-attendance}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # No `ports:` on purpose — the database is reachable only from the other
    # services on the compose network (the backend connects to host `db`).
    # Never publish 5432 on a production host.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-attendance_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    # STOPGAP: single worker. The WebAuthn challenge store is (currently)
    # in-process memory, so generate-options and verify MUST hit the same
    # worker. Running >1 worker caused intermittent "No pending authentication
    # challenge" login failures (~75% with 4 workers). Restore --workers >1
    # once challenges are persisted in PostgreSQL (webauthn_challenge_repository).
    # --proxy-headers + --forwarded-allow-ips=* lets FastAPI trust
    # X-Forwarded-Proto / X-Forwarded-Host from the upstream reverse proxy
    # (www.gogoffcc.com). Without this, requests look like plain HTTP and
    # WebAuthn origin checks fail.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --proxy-headers --forwarded-allow-ips=*
    # Published on the loopback interface only — the host nginx (which holds
    # the public /gogoffcc-arms/ location blocks) proxies to 127.0.0.1:8120.
    # Host port 8120 is chosen to avoid a collision with other apps commonly
    # squatting on 8000. Container port stays 8000 (uvicorn).
    ports:
      - "127.0.0.1:8120:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # NEXT_PUBLIC_* is baked into the bundle at build time — must be
        # passed as a build-arg, not a runtime env.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required at build time}
        # Path prefix when deployed under an upstream reverse proxy
        # (e.g. /gogoffcc-arms for www.gogoffcc.com/gogoffcc-arms). Leave
        # blank when deploying at the domain root.
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH-}
    restart: unless-stopped
    depends_on:
      - backend
    # Published on the loopback interface only — host nginx proxies to
    # 127.0.0.1:3000 for /gogoffcc-arms/.
    ports:
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
    driver: local

# -----------------------------------------------------------------------------
# Alternative: reuse a host Postgres (14+) instead of the bundled `db` service.
# Used by the original alg-compute-0 deployment, where one host Postgres is
# shared by several apps. To switch:
#   - Delete (or comment out) the `db:` service and the `volumes:` section
#   - Remove `depends_on:` under `backend:` and add instead:
#       extra_hosts:
#         - "host.docker.internal:host-gateway"
#   - In backend/.env, point DATABASE_URL at host.docker.internal:5432
#   - Provision the role + database on the host Postgres yourself, and allow
#     the Docker bridge subnet in pg_hba.conf:
#       host attendance attendance_user 172.16.0.0/12 scram-sha-256
#     plus listen_addresses = 'localhost,172.17.0.1' in postgresql.conf
#   - POSTGRES_* variables in the root .env are then no longer needed
# -----------------------------------------------------------------------------
