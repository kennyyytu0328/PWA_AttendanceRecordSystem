# =============================================================================
# GoGoFresh Attendance — Production Docker Compose Template
# =============================================================================
# This template assumes you are using an EXISTING PostgreSQL server on the
# Docker host (e.g., a shared Postgres serving multiple apps on the same VM).
# The backend container reaches it via `host.docker.internal`.
#
# If you would rather run a bundled Postgres container (single-tenant box,
# fully self-contained), see the commented-out `db:` service at the bottom of
# this file and the notes in docs/PRODUCTION_DEPLOYMENT_GUIDE.md.
#
# Differences from docker-compose.yml (dev):
#   - No bind mounts (images are self-contained, immutable)
#   - No --reload on uvicorn; use --workers for concurrency
#   - No hardcoded secrets; all env values pulled from .env files
#   - Backend/frontend behind a reverse proxy (nginx/Caddy) for TLS termination
#     — TLS is NOT handled in this file; put Caddy/nginx in front.
# =============================================================================
# Usage:
#   cp backend/.env.production.example backend/.env
#   cp frontend/.env.production.example frontend/.env.production
#   # fill in real values in both .env files
#   docker compose -f docker-compose.prod.yml up -d --build
# =============================================================================

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    # Map host.docker.internal to the host's gateway IP so the backend can
    # reach a Postgres running on the host (outside Docker). DATABASE_URL in
    # backend/.env should use `host.docker.internal:5432` as the host:port.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # Production: no --reload, use multiple workers for concurrency.
    # Tune --workers to ~ (2 * CPU cores) + 1.
    # --proxy-headers + --forwarded-allow-ips=* lets FastAPI trust
    # X-Forwarded-Proto / X-Forwarded-Host from the upstream reverse proxy
    # (www.gogoffcc.com). Without this, requests look like plain HTTP and
    # WebAuthn origin checks fail.
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4 --proxy-headers --forwarded-allow-ips=*
    # Published on the loopback interface only — the host nginx (which holds
    # the public /gogoffcc-arms/ location blocks) proxies to 127.0.0.1:8120.
    # Host port 8120 is chosen to avoid a collision with another app already
    # using 8000 on the production VM. Container port stays 8000 (uvicorn).
    ports:
      - "127.0.0.1:8120:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        # NEXT_PUBLIC_* is baked into the bundle at build time — must be
        # passed as a build-arg, not a runtime env.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required at build time}
        # Path prefix when deployed under an upstream reverse proxy
        # (e.g. /gogoffcc-arms for www.gogoffcc.com/gogoffcc-arms). Leave
        # blank when deploying at the domain root.
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH-}
    restart: unless-stopped
    depends_on:
      - backend
    # Published on the loopback interface only — host nginx proxies to
    # 127.0.0.1:3000 for /gogoffcc-arms/ (preserving the basePath prefix).
    ports:
      - "127.0.0.1:3000:3000"

# -----------------------------------------------------------------------------
# Optional: bundled Postgres (uncomment to run a Postgres container instead
# of using a host Postgres). If you uncomment this, also:
#   - Add `depends_on: db: { condition: service_healthy }` under `backend:`
#   - Remove the `extra_hosts:` block under `backend:` (not needed)
#   - In backend/.env, set DATABASE_URL host to `db` (the service name)
#   - Add a `volumes:` section at the bottom of this file with `pgdata:`
# -----------------------------------------------------------------------------
#   db:
#     image: postgres:16-alpine
#     restart: unless-stopped
#     environment:
#       POSTGRES_USER: ${POSTGRES_USER:-attendance_user}
#       POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
#       POSTGRES_DB: ${POSTGRES_DB:-attendance}
